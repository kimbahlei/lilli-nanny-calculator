<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lilli's Nanny Share Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --jade: #2d6a4f;
      --jade-light: #e8f5ef;
      --jade-mid: #b7deca;
      --hunter: #1a3a5c;
      --hunter-light: #e8f0f8;
      --hunter-mid: #aac4df;
      --neutral: #f7f5f0;
      --ink: #1c1c1c;
      --ink-light: #6b6b6b;
      --border: #e0dbd2;
      --white: #ffffff;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
      --radius: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--neutral);
      color: var(--ink);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 28px 24px 22px;
      text-align: center;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      letter-spacing: -0.5px;
    }
    header p { font-size: 0.875rem; color: var(--ink-light); margin-top: 4px; }

    .container { max-width: 820px; margin: 0 auto; padding: 0 16px; }

    /* WEEK BAR */
    .week-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      gap: 12px;
    }
    .week-label { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-light); }
    .week-nav { display: flex; align-items: center; gap: 10px; }
    .week-nav button {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      width: 32px; height: 32px; cursor: pointer; font-size: 1rem; color: var(--ink);
      display: flex; align-items: center; justify-content: center; transition: background 0.15s;
    }
    .week-nav button:hover { background: var(--neutral); }
    #week-display { font-weight: 600; font-size: 0.95rem; min-width: 190px; text-align: center; }

    /* SECTION LABEL */
    .section-label { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 10px; }

    /* HOST TOGGLE */
    .host-section { margin-top: 24px; }
    .host-toggle {
      display: flex; background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
    }
    .host-toggle button {
      flex: 1; padding: 14px 20px; border: none; background: transparent; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500; color: var(--ink-light);
      transition: background 0.2s, color 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .host-toggle button.active-jade   { background: var(--jade);   color: var(--white); }
    .host-toggle button.active-hunter { background: var(--hunter); color: var(--white); }
    .host-dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; opacity: 0.7; }

    /* CARD */
    .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-top: 20px; }
    .card-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 10px; }
    .card-header h2 { font-family: 'DM Serif Display', serif; font-size: 1.1rem; }
    .rate-badge { font-size: 0.75rem; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: #f0ebe2; color: var(--ink-light); }

    /* SAME TIME ROW */
    .same-time-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: #faf9f6; border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .same-time-row label { display: flex; align-items: center; gap: 7px; font-size: 0.82rem; font-weight: 500; color: var(--ink-light); cursor: pointer; user-select: none; white-space: nowrap; }
    .same-time-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--jade); cursor: pointer; }
    .same-time-inputs { display: flex; align-items: center; gap: 6px; }
    .same-time-inputs.disabled { display: none; }
    .same-time-inputs input[type="time"] {
      border: 1px solid var(--border); border-radius: 8px; padding: 5px 8px;
      font-family: 'DM Sans', sans-serif; font-size: 0.83rem; color: var(--ink);
      background: var(--white); width: 118px;
    }
    .same-time-inputs input[type="time"]:focus { outline: none; border-color: var(--jade); }
    .arr { font-size: 0.8rem; color: var(--ink-light); flex-shrink: 0; }

    /* ── DAY ROW ──
       Single flex row: [Day Name] [time input] [→] [time input] [hrs]
       Works on both desktop and mobile with no wrapping.
    */
    .day-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .day-row:last-child { border-bottom: none; }
    .day-row:hover { background: #faf9f6; }

    .day-row.header-row {
      background: #faf9f6;
      padding: 8px 16px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--ink-light);
    }
    .day-row.header-row:hover { background: #faf9f6; }

    .col-day  { flex: 0 0 96px; font-weight: 600; font-size: 0.9rem; }
    .col-time { flex: 1; min-width: 0; }
    .col-time input[type="time"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--ink);
      background: var(--white);
      cursor: pointer;
    }
    .col-time input[type="time"]:focus { outline: none; border-color: var(--jade); }
    .col-hrs { flex: 0 0 42px; text-align: right; font-weight: 600; font-size: 0.88rem; }

    .day-row.locked .col-time { opacity: 0.5; pointer-events: none; }

    /* Mobile: shrink day name and font sizes slightly */
    @media (max-width: 480px) {
      .day-row { gap: 5px; padding: 10px 12px; }
      .col-day  { flex: 0 0 76px; font-size: 0.78rem; }
      .col-time input[type="time"] { font-size: 0.72rem; padding: 6px 3px; }
      .arr { font-size: 0.7rem; }
      .col-hrs { flex: 0 0 36px; font-size: 0.78rem; }
      .same-time-inputs input[type="time"] { width: 88px; font-size: 0.75rem; padding: 5px 3px; }
      .day-row.header-row { display: none; }
    }

    /* FAMILY CARD */
    .family-card { border-radius: var(--radius); border: 2px solid transparent; overflow: hidden; box-shadow: var(--shadow); margin-top: 20px; }
    .family-card.jade-card   { border-color: var(--jade-mid); }
    .family-card.hunter-card { border-color: var(--hunter-mid); }
    .family-card-header { padding: 13px 18px; font-weight: 600; font-size: 0.9rem; }
    .jade-card .family-card-header   { background: var(--jade-light);   color: var(--jade); }
    .hunter-card .family-card-header { background: var(--hunter-light); color: var(--hunter); }
    .family-card .day-row.header-row { background: var(--white); }
    .family-card .day-row { background: var(--white); }
    .family-card .day-row:hover { background: #faf9f6; }

    /* SUMMARY */
    .summary-section { margin-top: 28px; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 480px) { .summary-grid { grid-template-columns: 1fr; } }
    .summary-card { border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .summary-card.jade   { border: 2px solid var(--jade-mid); }
    .summary-card.hunter { border: 2px solid var(--hunter-mid); }
    .summary-card-header { padding: 14px 20px; font-family: 'DM Serif Display', serif; font-size: 1.15rem; display: flex; align-items: center; justify-content: space-between; }
    .jade .summary-card-header   { background: var(--jade-light);   color: var(--jade); }
    .hunter .summary-card-header { background: var(--hunter-light); color: var(--hunter); }
    .summary-total { font-size: 1.4rem; font-weight: 700; }
    .summary-body { background: var(--white); padding: 14px 20px; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
    .summary-row:last-child { border-bottom: none; }
    .summary-row .label { color: var(--ink-light); }
    .summary-row .value { font-weight: 600; }

    /* ACTIONS */
    .actions { margin-top: 28px; display: flex; gap: 12px; justify-content: flex-end; }
    .btn { padding: 10px 22px; border-radius: 10px; border: 1px solid var(--border); background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500; cursor: pointer; color: var(--ink); }
    .btn:hover { background: var(--neutral); }
  </style>
</head>
<body>

<header>
  <h1>Lilli's Nanny Share</h1>
  <p>Weekly cost calculator for Jade &amp; Hunter</p>
</header>

<div class="week-bar container" style="max-width:820px;margin:0 auto;">
  <span class="week-label">Week of</span>
  <div class="week-nav">
    <button id="prev-week">&#8249;</button>
    <span id="week-display"></span>
    <button id="next-week">&#8250;</button>
  </div>
</div>

<div class="container" style="margin-top:24px;">

  <!-- HOST TOGGLE -->
  <div class="host-section">
    <div class="section-label">Who hosted Lilli this week?</div>
    <div class="host-toggle">
      <button id="host-jade" onclick="setHost('jade')"><span class="host-dot"></span> Jade's Home</button>
      <button id="host-hunter" onclick="setHost('hunter')"><span class="host-dot"></span> Hunter's Home</button>
    </div>
  </div>

  <!-- LILLI'S HOURS -->
  <div class="card" style="margin-top:24px;">
    <div class="card-header">
      <h2>Lilli's Hours</h2>
      <span class="rate-badge">Hosting family's schedule</span>
    </div>
    <div class="same-time-row">
      <label><input type="checkbox" id="sh-same-check" onchange="toggleSame('sh')"> Same time all days</label>
      <div class="same-time-inputs disabled" id="sh-same-inputs">
        <input type="time" id="sh-same-start" oninput="applySame('sh')">
        <span class="arr">&#8594;</span>
        <input type="time" id="sh-same-end" oninput="applySame('sh')">
      </div>
    </div>
    <div class="day-row header-row">
      <span class="col-day">Day</span><span class="col-time">Start</span><span class="col-time">End</span><span class="col-hrs">Hrs</span>
    </div>
    <div class="day-row" id="sh-tue-row">
      <span class="col-day">Tuesday</span>
      <div class="col-time"><input type="time" id="sh-tue-start" oninput="calc()"></div>
      <div class="col-time"><input type="time" id="sh-tue-end" oninput="calc()"></div>
      <span class="col-hrs" id="sh-tue-hrs">—</span>
    </div>
    <div class="day-row" id="sh-wed-row">
      <span class="col-day">Wednesday</span>
      <div class="col-time"><input type="time" id="sh-wed-start" oninput="calc()"></div>
      <div class="col-time"><input type="time" id="sh-wed-end" oninput="calc()"></div>
      <span class="col-hrs" id="sh-wed-hrs">—</span>
    </div>
    <div class="day-row" id="sh-thu-row">
      <span class="col-day">Thursday</span>
      <div class="col-time"><input type="time" id="sh-thu-start" oninput="calc()"></div>
      <div class="col-time"><input type="time" id="sh-thu-end" oninput="calc()"></div>
      <span class="col-hrs" id="sh-thu-hrs">—</span>
    </div>
  </div>

  <!-- NON-HOST FAMILY HOURS -->
  <div id="nonhost-card-wrap"></div>

  <!-- SUMMARY -->
  <div class="summary-section">
    <div class="section-label">Weekly Summary</div>
    <div class="summary-grid">
      <div class="summary-card jade">
        <div class="summary-card-header">Jade <span class="summary-total" id="jade-total">$0.00</span></div>
        <div class="summary-body">
          <div class="summary-row"><span class="label">Shared hrs &times; $16</span><span class="value" id="jade-shared-line">—</span></div>
          <div class="summary-row"><span class="label">Solo hrs &times; $23</span><span class="value" id="jade-solo-line">—</span></div>
        </div>
      </div>
      <div class="summary-card hunter">
        <div class="summary-card-header">Hunter <span class="summary-total" id="hunter-total">$0.00</span></div>
        <div class="summary-body">
          <div class="summary-row"><span class="label">Shared hrs &times; $16</span><span class="value" id="hunter-shared-line">—</span></div>
          <div class="summary-row"><span class="label">Solo hrs &times; $23</span><span class="value" id="hunter-solo-line">—</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn" onclick="resetForm()">Reset Week</button>
  </div>

</div>

<script>
  const SHARED_RATE = 16;
  const SOLO_RATE   = 23;
  const DAYS        = ['tue','wed','thu'];
  const DAY_LABELS  = { tue:'Tuesday', wed:'Wednesday', thu:'Thursday' };
  let host = 'jade';

  // ── WEEK NAV ─────────────────────────────────────────
  let weekOffset = 0;
  function getTuesdayRange(offset) {
    const today = new Date();
    const dist = (today.getDay() + 7 - 2) % 7;
    const tue = new Date(today);
    tue.setDate(today.getDate() - dist + offset * 7);
    const thu = new Date(tue); thu.setDate(tue.getDate() + 2);
    const o = { month:'short', day:'numeric' };
    return tue.toLocaleDateString('en-US',o) + ' \u2013 ' + thu.toLocaleDateString('en-US',o);
  }
  function updateWeekDisplay() { document.getElementById('week-display').textContent = getTuesdayRange(weekOffset); }
  document.getElementById('prev-week').addEventListener('click', () => { weekOffset--; updateWeekDisplay(); });
  document.getElementById('next-week').addEventListener('click', () => { weekOffset++; updateWeekDisplay(); });
  updateWeekDisplay();

  // ── HOST ─────────────────────────────────────────────
  function setHost(h) {
    host = h;
    document.getElementById('host-jade').className   = h === 'jade'   ? 'active-jade'   : '';
    document.getElementById('host-hunter').className = h === 'hunter' ? 'active-hunter' : '';

    // Pre-fill Lilli's default hours based on host
    const defaultStart = h === 'hunter' ? '08:15' : '08:30';
    const defaultEnd   = h === 'hunter' ? '17:30' : '17:00';
    DAYS.forEach(function(d) {
      document.getElementById('sh-' + d + '-start').value = defaultStart;
      document.getElementById('sh-' + d + '-end').value   = defaultEnd;
    });

    // Also check "Same time all days" and set master inputs
    document.getElementById('sh-same-check').checked = true;
    document.getElementById('sh-same-inputs').classList.remove('disabled');
    document.getElementById('sh-same-start').value = defaultStart;
    document.getElementById('sh-same-end').value   = defaultEnd;

    renderNonHostCard();
    calc();
  }

  // ── NON-HOST CARD ─────────────────────────────────────
  function nonHostCardHTML(family) {
    const label = family === 'jade' ? 'Jade' : 'Hunter';
    const cls   = family + '-card';
    const rows  = DAYS.map(function(d) {
      return '<div class="day-row" id="nh-' + d + '-row">' +
        '<span class="col-day">' + DAY_LABELS[d] + '</span>' +
        '<div class="col-time"><input type="time" id="nh-' + d + '-start" oninput="calc()"></div>' +
        '<div class="col-time"><input type="time" id="nh-' + d + '-end" oninput="calc()"></div>' +
        '<span class="col-hrs" id="nh-' + d + '-hrs">&#x2014;</span>' +
      '</div>';
    }).join('');

    return '<div class="family-card ' + cls + '">' +
      '<div class="family-card-header">' + label + '\'s Hours</div>' +
      '<div class="same-time-row" style="background:var(--white);">' +
        '<label><input type="checkbox" id="nh-same-check" onchange="toggleSame(\'nh\')"> Same time all days</label>' +
        '<div class="same-time-inputs disabled" id="nh-same-inputs">' +
          '<input type="time" id="nh-same-start" oninput="applySame(\'nh\')">' +
          '<input type="time" id="nh-same-end" oninput="applySame(\'nh\')">' +
        '</div>' +
      '</div>' +
      '<div class="day-row header-row">' +
        '<span class="col-day">Day</span><span class="col-time">Start</span><span class="col-time">End</span><span class="col-hrs">Hrs</span>' +
      '</div>' +
      rows +
    '</div>';
  }

  function renderNonHostCard() {
    const nonHost = host === 'jade' ? 'hunter' : 'jade';
    document.getElementById('nonhost-card-wrap').innerHTML = nonHostCardHTML(nonHost);
  }

  // ── SAME TIME ─────────────────────────────────────────
  function toggleSame(prefix) {
    const checked  = document.getElementById(prefix + '-same-check').checked;
    const inputsDiv = document.getElementById(prefix + '-same-inputs');
    if (checked) {
      inputsDiv.classList.remove('disabled');
      const s = document.getElementById(prefix + '-tue-start').value;
      const e = document.getElementById(prefix + '-tue-end').value;
      if (s) document.getElementById(prefix + '-same-start').value = s;
      if (e) document.getElementById(prefix + '-same-end').value   = e;
      if (s && e) applySame(prefix);
    } else {
      document.getElementById(prefix + '-same-start').value = '';
      document.getElementById(prefix + '-same-end').value   = '';
      inputsDiv.classList.add('disabled');
      DAYS.forEach(d => {
        const si = document.getElementById(prefix + '-' + d + '-start');
        const ei = document.getElementById(prefix + '-' + d + '-end');
        const row = document.getElementById(prefix + '-' + d + '-row');
        if (si) si.value = '';
        if (ei) ei.value = '';
        if (row) row.classList.remove('locked');
      });
      calc();
    }
  }

  function applySame(prefix) {
    const checked = document.getElementById(prefix + '-same-check').checked;
    if (!checked) return;
    const s = document.getElementById(prefix + '-same-start').value;
    const e = document.getElementById(prefix + '-same-end').value;
    DAYS.forEach(d => {
      const si  = document.getElementById(prefix + '-' + d + '-start');
      const ei  = document.getElementById(prefix + '-' + d + '-end');
      const row = document.getElementById(prefix + '-' + d + '-row');
      if (!si) return;
      si.value = s; ei.value = e;
      if (row) { if (s || e) row.classList.add('locked'); else row.classList.remove('locked'); }
    });
    calc();
  }

  // ── TIME HELPERS ──────────────────────────────────────
  function parseTime(id) {
    const el = document.getElementById(id);
    if (!el || !el.value) return null;
    const p = el.value.split(':').map(Number);
    return p[0] * 60 + p[1];
  }
  function hoursElapsed(sId, eId) {
    const s = parseTime(sId), e = parseTime(eId);
    if (s === null || e === null || e <= s) return 0;
    return (e - s) / 60;
  }
  function overlapHours(ls, le, ns, ne) {
    // all in minutes
    if (ls === null || le === null || ns === null || ne === null) return 0;
    const start = Math.max(ls, ns), end = Math.min(le, ne);
    return end > start ? (end - start) / 60 : 0;
  }
  function fmtHrs(h)   { return h > 0 ? h.toFixed(2) : '0.00'; }
  function fmtMoney(n) { return '$' + n.toFixed(2); }

  // ── CALC ─────────────────────────────────────────────
  function calc() {
    let totalShared = 0, totalLilli = 0, totalHostSolo = 0;

    DAYS.forEach(d => {
      const ls = parseTime('sh-' + d + '-start');
      const le = parseTime('sh-' + d + '-end');
      const ns = parseTime('nh-' + d + '-start');
      const ne = parseTime('nh-' + d + '-end');

      const lilliHrs = (ls !== null && le !== null && le > ls) ? (le - ls) / 60 : 0;
      const shared   = overlapHours(ls, le, ns, ne);
      const hostSolo = Math.max(0, lilliHrs - shared);

      totalLilli    += lilliHrs;
      totalShared   += shared;
      totalHostSolo += hostSolo;

      document.getElementById('sh-' + d + '-hrs').textContent = fmtHrs(lilliHrs);
      const nhEl = document.getElementById('nh-' + d + '-hrs');
      if (nhEl) nhEl.textContent = fmtHrs(shared);
    });

    const sharedCostEach = totalShared   * SHARED_RATE;
    const hostSoloCost   = totalHostSolo * SOLO_RATE;

    const hostCosts    = { shared: sharedCostEach, solo: hostSoloCost };
    const nonHostCosts = { shared: sharedCostEach, solo: 0 };
    const jadeCosts    = host === 'jade'   ? hostCosts : nonHostCosts;
    const hunterCosts  = host === 'hunter' ? hostCosts : nonHostCosts;
    const jadeSolo     = host === 'jade'   ? totalHostSolo : 0;
    const hunterSolo   = host === 'hunter' ? totalHostSolo : 0;

    document.getElementById('jade-shared-line').textContent   = fmtHrs(totalShared) + ' hrs = ' + fmtMoney(jadeCosts.shared);
    document.getElementById('jade-solo-line').textContent     = jadeCosts.solo > 0   ? fmtHrs(jadeSolo)    + ' hrs = ' + fmtMoney(jadeCosts.solo)   : '\u2014';
    document.getElementById('jade-total').textContent         = fmtMoney(jadeCosts.shared   + jadeCosts.solo);
    document.getElementById('hunter-shared-line').textContent = fmtHrs(totalShared) + ' hrs = ' + fmtMoney(hunterCosts.shared);
    document.getElementById('hunter-solo-line').textContent   = hunterCosts.solo > 0 ? fmtHrs(hunterSolo)  + ' hrs = ' + fmtMoney(hunterCosts.solo) : '\u2014';
    document.getElementById('hunter-total').textContent       = fmtMoney(hunterCosts.shared + hunterCosts.solo);
  }

  // ── RESET ─────────────────────────────────────────────
  function resetForm() {
    if (!confirm('Reset all times for this week?')) return;
    document.querySelectorAll('input[type="time"]').forEach(el => el.value = '');
    document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
    document.querySelectorAll('.same-time-inputs').forEach(el => el.classList.add('disabled'));
    document.querySelectorAll('.day-row.locked').forEach(el => el.classList.remove('locked'));
    renderNonHostCard();
    calc();
  }

  // ── INIT ─────────────────────────────────────────────
  setHost('jade');
  calc();
</script>
</body>
</html>
